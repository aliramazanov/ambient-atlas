<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100" role="img" aria-label="Ambient Atlas">
  <defs>
    <radialGradient id="lg-globe" cx="42%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#13233f"/>
      <stop offset="70%" stop-color="#0a1326"/>
      <stop offset="100%" stop-color="#060b16"/>
    </radialGradient>
  </defs>

  <!-- Dossier panel -->
  <rect x="1" y="1" width="378" height="98" rx="14" fill="#0a1022" stroke="rgba(198,170,116,0.28)"/>

  <!-- Globe mark -->
  <g transform="translate(54,50)">
    <circle r="34" fill="rgba(140,200,255,0.05)"/>
    <circle r="29" fill="url(#lg-globe)" stroke="rgba(198,170,116,0.55)" stroke-width="1.4"/>
    <g fill="none" stroke="rgba(198,170,116,0.4)" stroke-width="1">
      <line x1="-29" y1="0" x2="29" y2="0"/>
      <ellipse rx="14.5" ry="29"/>
      <ellipse rx="29" ry="14.5"/>
    </g>
    <!-- exposure markers -->
    <circle cx="-11" cy="-12" r="3.1" fill="#f2c14e"/>
    <circle cx="9" cy="-6" r="3.1" fill="#62a8f0"/>
    <circle cx="-6" cy="13" r="3.1" fill="#ef7a93"/>
    <circle r="4.4" fill="#e3c585"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Sora','Inter',ui-sans-serif,system-ui,sans-serif">
    <text x="104" y="50" font-size="27" font-weight="700" letter-spacing="0.5" fill="#e8eaf1">Ambient<tspan fill="#cba869"> Atlas</tspan></text>
    <text x="105" y="70" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="9" letter-spacing="2.6" fill="#687485">AMBIENT EXPOSURE ATLAS</text>
  </g>
</svg>
