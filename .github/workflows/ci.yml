name: CI

# Quality gates for every push and pull request: the type/style check must be
# clean (0 errors, 0 warnings) and the production build must succeed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type and style check (svelte-check, must be 0 errors / 0 warnings)
        run: pnpm check

      - name: Production build
        run: pnpm build
