<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Ambient Atlas">
  <style>
    /* Linework adapts to the browser tab theme so the mark stays visible on
       both light and dark chrome. The gold core is a mid-tone accent that
       reads on either. */
    .ink { stroke: #0c1530; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #eef1f8; }
    }
  </style>
  <g class="ink" fill="none" stroke-linecap="round">
    <circle cx="16" cy="16" r="11.5" stroke-width="2.2" />
    <line x1="4.5" y1="16" x2="27.5" y2="16" stroke-width="1.7" />
    <ellipse cx="16" cy="16" rx="5.6" ry="11.5" stroke-width="1.7" />
  </g>
  <circle cx="16" cy="16" r="3" fill="#d9b46a" />
</svg>
